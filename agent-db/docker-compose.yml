services:
  otel-agent:
    image: otel/opentelemetry-collector-contrib:${OTELCOL_CONTRIB_VERSION:-0.146.0}
    container_name: otel-agent-db
    restart: unless-stopped
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./otel-agent-config.yaml:/etc/otel/config.yaml
      - /:/hostfs:ro
      - ${PG_LOG_PATH:-/var/lib/postgresql/17/main/pg_log}:/var/log/postgresql:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    environment:
      HOST_PROC: /hostfs/proc
      HOST_SYS: /hostfs/sys
      HOST_ETC: /hostfs/etc
      HOST_VAR: /hostfs/var
      SIGNOZ_ENDPOINT: ${SIGNOZ_ENDPOINT}
      PG_HOST: ${PG_HOST:-host.docker.internal}
      PG_PORT: ${PG_PORT:-5432}
      PG_USER: ${PG_MONITOR_USER}
      PG_PASSWORD: ${PG_MONITOR_PASSWORD}
      PG_DATABASE: ${PG_DATABASE:-unnichat}
      PG_SERVICE_NAME: ${PG_SERVICE_NAME:-postgresql}
      PG_ROLE: ${PG_ROLE:-primary}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    pid: host
    logging:
      options:
        max-size: "20m"
        max-file: "3"
