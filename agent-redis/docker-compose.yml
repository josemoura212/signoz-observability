services:
  otel-agent:
    image: otel/opentelemetry-collector-contrib:0.146.0
    container_name: otel-agent-redis
    hostname: ${HOST_NAME}
    restart: unless-stopped
    command: ['--config=https://raw.githubusercontent.com/josemoura212/signoz-observability/main/agent-redis/otel-agent-config.yaml']
    volumes:
      - /:/hostfs:ro
      - ${REDIS_LOG_PATH:-/var/log/redis}:/var/log/redis:ro
    environment:
      HOST_PROC: /hostfs/proc
      HOST_SYS: /hostfs/sys
      HOST_ETC: /hostfs/etc
      HOST_VAR: /hostfs/var
      SIGNOZ_ENDPOINT: ${SIGNOZ_ENDPOINT}
      REDIS_ENDPOINT: ${REDIS_ENDPOINT:-host.docker.internal:6379}
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    pid: host
    logging:
      options:
        max-size: '20m'
        max-file: '3'
