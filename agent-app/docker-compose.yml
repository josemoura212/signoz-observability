services:
  otel-agent:
    image: otel/opentelemetry-collector-contrib:0.146.0
    container_name: otel-agent-server
    restart: unless-stopped
    command: ['--config=https://raw.githubusercontent.com/josemoura212/signoz-observability/main/agent-app/otel-agent-config.yaml']
    volumes:
      - /:/hostfs:ro
    ports:
      - '4317:4317'
      - '4318:4318'
    environment:
      HOST_PROC: /hostfs/proc
      HOST_SYS: /hostfs/sys
      HOST_ETC: /hostfs/etc
      HOST_VAR: /hostfs/var
      SIGNOZ_ENDPOINT: ${SIGNOZ_ENDPOINT}
    pid: host
    logging:
      options:
        max-size: '20m'
        max-file: '3'
