services:
  init-clickhouse:
    image: clickhouse/clickhouse-server:25.5.6
    container_name: signoz-init-clickhouse
    networks:
      - signoz-net
    command:
      - bash
      - -c
      - |
        version="v0.0.1"
        node_os=$$(uname -s | tr '[:upper:]' '[:lower:]')
        node_arch=$$(uname -m | sed s/aarch64/arm64/ | sed s/x86_64/amd64/)
        echo "Fetching histogram-binary for $${node_os}/$${node_arch}"
        cd /tmp
        wget -O histogram-quantile.tar.gz "https://github.com/SigNoz/signoz/releases/download/histogram-quantile%2F$${version}/histogram-quantile_$${node_os}_$${node_arch}.tar.gz"
        tar -xvzf histogram-quantile.tar.gz
        mv histogram-quantile /var/lib/clickhouse/user_scripts/histogramQuantile
    restart: on-failure
    volumes:
      - clickhouse_user_scripts:/var/lib/clickhouse/user_scripts/
    logging:
      options:
        max-size: '50m'
        max-file: '3'

  zookeeper:
    image: signoz/zookeeper:3.7.1
    container_name: signoz-zookeeper
    restart: unless-stopped
    user: root
    networks:
      - signoz-net
    labels:
      signoz.io/scrape: 'true'
      signoz.io/port: '9141'
      signoz.io/path: '/metrics'
    volumes:
      - zookeeper_data:/bitnami/zookeeper
    environment:
      ZOO_SERVER_ID: '1'
      ALLOW_ANONYMOUS_LOGIN: 'yes'
      ZOO_AUTOPURGE_INTERVAL: '1'
      ZOO_ENABLE_PROMETHEUS_METRICS: 'yes'
      ZOO_PROMETHEUS_METRICS_PORT_NUMBER: '9141'
    healthcheck:
      test: ['CMD-SHELL', 'curl -s -m 2 http://localhost:8080/commands/ruok | grep error | grep null']
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      options:
        max-size: '50m'
        max-file: '3'

  clickhouse:
    image: clickhouse/clickhouse-server:25.5.6
    container_name: signoz-clickhouse
    restart: unless-stopped
    tty: true
    networks:
      - signoz-net
    labels:
      signoz.io/scrape: 'true'
      signoz.io/port: '9363'
      signoz.io/path: '/metrics'
    depends_on:
      init-clickhouse:
        condition: service_completed_successfully
      zookeeper:
        condition: service_healthy
    entrypoint: ['/bin/bash', '-c']
    command:
      - |
        BASE="https://raw.githubusercontent.com/josemoura212/signoz-observability/main"
        wget -q -O /etc/clickhouse-server/config.xml "$$BASE/clickhouse-config.xml"
        mkdir -p /etc/clickhouse-server/config.d
        wget -q -O /etc/clickhouse-server/config.d/cluster.xml "$$BASE/clickhouse-cluster.xml"
        wget -q -O /etc/clickhouse-server/users.xml "$$BASE/clickhouse-users.xml"
        wget -q -O /etc/clickhouse-server/custom-function.xml "$$BASE/clickhouse-custom-function.xml"
        exec /entrypoint.sh
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
      - clickhouse_user_scripts:/var/lib/clickhouse/user_scripts/
    environment:
      CLICKHOUSE_SKIP_USER_SETUP: '1'
    ulimits:
      nproc: 65535
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', '127.0.0.1:8123/ping']
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      options:
        max-size: '50m'
        max-file: '3'

  signoz:
    image: signoz/signoz:${SIGNOZ_VERSION:-v0.113.0}
    container_name: signoz
    restart: unless-stopped
    networks:
      - signoz-net
    depends_on:
      clickhouse:
        condition: service_healthy
    ports:
      - '${SIGNOZ_PORT:-3301}:8080'
    volumes:
      - signoz_data:/var/lib/signoz
    environment:
      SIGNOZ_ALERTMANAGER_PROVIDER: signoz
      SIGNOZ_TELEMETRYSTORE_CLICKHOUSE_DSN: tcp://clickhouse:9000
      SIGNOZ_SQLSTORE_SQLITE_PATH: /var/lib/signoz/signoz.db
      SIGNOZ_TOKENIZER_JWT_SECRET: ${SIGNOZ_JWT_SECRET:-changeme}
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'localhost:8080/api/v1/health']
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      options:
        max-size: '50m'
        max-file: '3'

  signoz-telemetrystore-migrator:
    image: signoz/signoz-otel-collector:${OTELCOL_TAG:-v0.144.2}
    container_name: signoz-telemetrystore-migrator
    restart: on-failure
    networks:
      - signoz-net
    depends_on:
      clickhouse:
        condition: service_healthy
    environment:
      SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_DSN: tcp://clickhouse:9000
      SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_CLUSTER: cluster
      SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_REPLICATION: 'true'
      SIGNOZ_OTEL_COLLECTOR_TIMEOUT: 10m
    entrypoint: ['/bin/sh']
    command:
      - -c
      - |
        /signoz-otel-collector migrate bootstrap &&
        /signoz-otel-collector migrate sync up &&
        /signoz-otel-collector migrate async up
    logging:
      options:
        max-size: '50m'
        max-file: '3'

  init-otel-collector:
    image: alpine:3.21
    container_name: signoz-init-otel-collector
    restart: on-failure
    networks:
      - signoz-net
    volumes:
      - otel_collector_config:/config
    command:
      - /bin/sh
      - -c
      - |
        wget -q -O /config/otel-collector-config.yaml "https://raw.githubusercontent.com/josemoura212/signoz-observability/main/otel-collector-config.yaml" &&
        echo 'server_endpoint: ws://signoz:4320/v1/opamp' > /config/manager-config.yaml
    logging:
      options:
        max-size: '10m'
        max-file: '3'

  otel-collector:
    image: signoz/signoz-otel-collector:${OTELCOL_TAG:-v0.144.2}
    container_name: signoz-otel-collector
    restart: unless-stopped
    networks:
      - signoz-net
    depends_on:
      clickhouse:
        condition: service_healthy
      signoz-telemetrystore-migrator:
        condition: service_completed_successfully
      init-otel-collector:
        condition: service_completed_successfully
    volumes:
      - otel_collector_config:/config
      - /:/hostfs:ro
    pid: host
    entrypoint: ['/bin/sh']
    command:
      - -c
      - |
        /signoz-otel-collector migrate sync check &&
        /signoz-otel-collector --config=/config/otel-collector-config.yaml --manager-config=/config/manager-config.yaml --copy-path=/var/tmp/collector-config-copy.yaml
    environment:
      OTEL_RESOURCE_ATTRIBUTES: host.name=signoz-host,os.type=linux
      LOW_CARDINAL_EXCEPTION_GROUPING: 'false'
      SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_DSN: tcp://clickhouse:9000
      SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_CLUSTER: cluster
      SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_REPLICATION: 'true'
      SIGNOZ_OTEL_COLLECTOR_TIMEOUT: 10m
      HOST_PROC: /hostfs/proc
      HOST_SYS: /hostfs/sys
      HOST_ETC: /hostfs/etc
      HOST_VAR: /hostfs/var
    ports:
      - '4317:4317'
      - '4318:4318'
    logging:
      options:
        max-size: '50m'
        max-file: '3'

networks:
  signoz-net:
    name: signoz-net

volumes:
  zookeeper_data:
    name: signoz-zookeeper
  clickhouse_data:
    name: signoz-clickhouse
  clickhouse_logs:
    name: signoz-clickhouse-logs
  clickhouse_user_scripts:
    name: signoz-clickhouse-user-scripts
  signoz_data:
    name: signoz-data
  otel_collector_config:
    name: signoz-otel-collector-config
